<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SentioCap — Document Upload</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FAFAF8;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 640px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p.subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
    }
    .drop-zone.dragover {
      border-color: #4A7C59;
      background: #f0f7f2;
    }
    .drop-zone.uploading {
      border-color: #EAB308;
      background: #fffef0;
    }
    .drop-zone.done {
      border-color: #22C55E;
      background: #f0fdf4;
    }
    .drop-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .drop-text {
      font-size: 1rem;
      color: #666;
      margin-bottom: 0.5rem;
    }
    .drop-hint {
      font-size: 0.8rem;
      color: #999;
    }
    input[type="file"] { display: none; }
    .file-list {
      margin-top: 1.5rem;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    .file-item .name {
      font-weight: 500;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-item .size {
      color: #999;
      font-size: 0.8rem;
      margin-left: 1rem;
    }
    .file-item .status {
      margin-left: 1rem;
      font-size: 0.85rem;
    }
    .status-pending { color: #999; }
    .status-uploading { color: #EAB308; }
    .status-done { color: #22C55E; }
    .status-error { color: #EF4444; }
    .upload-btn {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.75rem;
      background: #1A1A1A;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .upload-btn:hover { background: #333; }
    .upload-btn:disabled { background: #ccc; cursor: not-allowed; }
    .note {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 SentioCap Document Upload</h1>
    <p class="subtitle">Drop your FP&A reports, board decks, or budget books. We'll map them to the SentioCap taxonomy.</p>

    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📁</div>
      <div class="drop-text">Drag & drop files here, or click to browse</div>
      <div class="drop-hint">Accepts: .pptx, .pdf, .xlsx, .csv (max 50MB each)</div>
    </div>
    <input type="file" id="fileInput" multiple accept=".pptx,.pdf,.xlsx,.csv,.xls,.ppt">

    <div class="file-list" id="fileList"></div>

    <button class="upload-btn" id="uploadBtn" disabled>Upload Files</button>

    <p class="note">Files are stored securely in Supabase. Only you and Tide can access them.</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://gimxgwtpkzseaqgjfjrp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_-Y1Mt7DaxBPnIqgwq2pCzw_qCQouByI';
    const BUCKET = 'documents';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const uploadBtn = document.getElementById('uploadBtn');

    let files = [];

    // Click to browse
    dropZone.addEventListener('click', () => fileInput.click());

    // Drag events
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });

    // File input change
    fileInput.addEventListener('change', () => {
      addFiles(fileInput.files);
      fileInput.value = '';
    });

    function addFiles(newFiles) {
      for (const f of newFiles) {
        if (f.size > 50 * 1024 * 1024) {
          alert(`${f.name} is too large (max 50MB)`);
          continue;
        }
        files.push({ file: f, status: 'pending' });
      }
      renderFiles();
      uploadBtn.disabled = files.length === 0;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function renderFiles() {
      fileList.innerHTML = files.map((f, i) => `
        <div class="file-item">
          <span class="name">${f.file.name}</span>
          <span class="size">${formatSize(f.file.size)}</span>
          <span class="status status-${f.status}">
            ${f.status === 'pending' ? '⏳ Ready' : ''}
            ${f.status === 'uploading' ? '⬆️ Uploading...' : ''}
            ${f.status === 'done' ? '✅ Done' : ''}
            ${f.status === 'error' ? '❌ Failed' : ''}
          </span>
        </div>
      `).join('');
    }

    // Upload
    uploadBtn.addEventListener('click', async () => {
      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Uploading...';
      dropZone.classList.add('uploading');

      // First ensure bucket exists (will 409 if exists, that's fine)
      try {
        await fetch(`${SUPABASE_URL}/storage/v1/bucket`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'apikey': SUPABASE_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ id: BUCKET, name: BUCKET, public: false })
        });
      } catch (e) { /* bucket may already exist */ }

      for (let i = 0; i < files.length; i++) {
        if (files[i].status === 'done') continue;
        files[i].status = 'uploading';
        renderFiles();

        const f = files[i].file;
        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
        const path = `uploads/${timestamp}_${f.name}`;

        try {
          const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'apikey': SUPABASE_KEY,
              'Content-Type': f.type || 'application/octet-stream',
              'x-upsert': 'true'
            },
            body: f
          });

          if (res.ok) {
            files[i].status = 'done';

            // Also notify the API
            try {
              await fetch('https://sentiocap-api.pairwater.com/api/notify-upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: f.name, path: path, size: f.size })
              });
            } catch (e) { /* notification is best-effort */ }
          } else {
            const err = await res.text();
            console.error('Upload failed:', err);
            files[i].status = 'error';
          }
        } catch (e) {
          console.error('Upload error:', e);
          files[i].status = 'error';
        }
        renderFiles();
      }

      dropZone.classList.remove('uploading');
      dropZone.classList.add('done');
      uploadBtn.textContent = 'Upload Complete ✓';

      // Reset after 3 seconds
      setTimeout(() => {
        dropZone.classList.remove('done');
        uploadBtn.textContent = 'Upload Files';
        uploadBtn.disabled = files.filter(f => f.status === 'pending').length === 0;
      }, 3000);
    });
  </script>
</body>
</html>
